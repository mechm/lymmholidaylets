services:
  mssql:
    # Build the custom image using the Dockerfile in the 'db' subdirectory
    build: ./db
    container_name: mssql_db
    restart: always
    environment:
      # CRITICAL: These must be set and match the password used in entrypoint.sh
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Password123" 
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      # Persist data using a named volume
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Password123' -Q 'SELECT 1' -C >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  lymmholidaylets-api:
    build:
      context: .
      dockerfile: src/LymmHolidayLets.Api/Dockerfile
    ports:
      - "8080:80"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__LymmHolidayLets: "Server=mssql,1433;Database=LymmHolidayLets;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=True;Encrypt=False;"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
    depends_on:
      mssql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"] # Or the correct health endpoint
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s # Give the API a grace period to start
    restart: unless-stopped

  lymmholidaylets-notificationworker:
    build:
      context: .
      dockerfile: src/LymmHolidayLets.NotificationWorker/Dockerfile
    container_name: notification_worker
    environment:
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
      ConnectionStrings__LymmHolidayLets: "Server=mssql,1433;Database=LymmHolidayLets;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=True;Encrypt=False;"
      Email__CompanyName: ""
      Email__CompanyEmail: ""
      SmtpConfig__Server: "mail.smtp2go.com"
      SmtpConfig__Port: "465"
      SmtpConfig__EnableSsl: "true"
      SmtpConfig__User: ""
      SmtpConfig__Password: ""
      SmtpConfig__FromName: "Lymm Holiday Lets"
      SmtpConfig__FromEmailAddress: ""
    depends_on:
      mssql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  lymmholidaylets-calendarimporter:
    build:
      context: .
      dockerfile: src/LymmHolidayLets.CalendarImporter/Dockerfile
    container_name: calendar_importer
    environment:
      ConnectionStrings__LymmHolidayLets: "Server=mssql,1433;Database=LymmHolidayLets;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=True;Encrypt=False;"
      CalendarSync__IntervalMinutes: "30"
      Logging__LogLevel__Default: "Information"
      Logging__LogLevel__LymmHolidayLets.CalendarImporter: "Information"
    depends_on:
      mssql:
        condition: service_healthy
    restart: unless-stopped

  lymmholidaylets-calendarmaintenance:
    build:
      context: .
      dockerfile: src/LymmHolidayLets.CalendarMaintenanceWorker/Dockerfile
    container_name: calendar_maintenance
    environment:
      ConnectionStrings__LymmHolidayLets: "Server=mssql,1433;Database=LymmHolidayLets;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=True;Encrypt=False;"
    depends_on:
      mssql:
        condition: service_healthy
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI — http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/lymmholidaylets.ui/Dockerfile 
    restart: always
    ports:
      - "3003:3000" 
    environment:
      API_BASE_URL: http://lymmholidaylets-api:80 
    depends_on:
      lymmholidaylets-api:
        condition: service_healthy
    command: npm run start

volumes:
  mssql_data: